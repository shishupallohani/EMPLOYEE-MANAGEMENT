<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Add Employee</title>
	<!-- CSS -->
	<link rel="stylesheet" href="/css/style.css">
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

	<style>
		/* Agar CSS file load na ho toh inline CSS backup */
		.modal-overlay {
			display: none !important;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0,0,0,0.6);
			backdrop-filter: blur(8px);
			z-index: 9999;
			justify-content: center;
			align-items: center;
		}
		.modal-overlay.active {
			display: flex !important;
		}
		.modal-box {
			background: white;
			border-radius: 24px;
			padding: 40px 50px;
			max-width: 520px;
			width: 90%;
			position: relative;
			box-shadow: 0 30px 80px rgba(0,0,0,0.3);
		}
		.modal-close {
			position: absolute;
			top: 15px;
			right: 20px;
			font-size: 28px;
			color: #999;
			cursor: pointer;
			background: none;
			border: none;
		}
		.modal-close:hover { color: #333; }
		.modal-title {
			font-size: 26px;
			font-weight: 700;
			color: #1a237e;
			margin-bottom: 25px;
		}
		.modal-title i { color: #0d47a1; }
		.form-group { margin-bottom: 18px; }
		.form-group label {
			font-weight: 600;
			color: #333;
			display: block;
			margin-bottom: 5px;
		}
		.form-group input, .form-group select {
			width: 100%;
			padding: 12px 16px;
			border: 2px solid #e0e0e0;
			border-radius: 12px;
			font-size: 15px;
		}
		.form-group input:focus, .form-group select:focus {
			border-color: #1a237e;
			outline: none;
		}
		.modal-buttons {
			display: flex;
			gap: 12px;
			margin-top: 25px;
		}
		.modal-buttons .btn-save {
			flex: 1;
			padding: 14px;
			background: linear-gradient(135deg, #1a237e, #0d47a1);
			color: white;
			border: none;
			border-radius: 12px;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
		}
		.modal-buttons .btn-save:hover {
			transform: translateY(-2px);
		}
		.modal-buttons .btn-cancel {
			flex: 0.5;
			padding: 14px;
			background: #f0f0f0;
			color: #555;
			border: none;
			border-radius: 12px;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
		}
		.modal-buttons .btn-cancel:hover {
			background: #e0e0e0;
		}
		@media (max-width: 576px) {
			.modal-box { padding: 30px 25px; }
			.modal-buttons { flex-direction: column; }
			.modal-buttons .btn-cancel { flex: 1; }
		}
	</style>
</head>
<body>

<!-- MODAL - Active class se automatically open hoga -->
<div class="modal-overlay active" id="employeeModal">
	<div class="modal-box">

		<!-- Close Button -->
		<button class="modal-close" id="closeModalBtn">✕</button>

		<!-- Title -->
		<div class="modal-title">
			<i class="fas fa-user-plus"></i> Add New Employee
		</div>

		<!-- Form -->
		<form id="employeeForm" th:action="@{/saveEmployee}" th:object="${employee}" method="POST">

			<div class="form-group">
				<label for="firstName">First Name</label>
				<input type="text" id="firstName" th:field="*{firstName}"
					   placeholder="Enter first name" class="form-control" required>
			</div>

			<div class="form-group">
				<label for="lastName">Last Name</label>
				<input type="text" id="lastName" th:field="*{lastName}"
					   placeholder="Enter last name" class="form-control" required>
			</div>

			<div class="form-group">
				<label for="email">Email</label>
				<input type="email" id="email" th:field="*{email}"
					   placeholder="Enter email" class="form-control" required>
			</div>

			<div class="form-group">
				<label for="location">Location</label>
				<select id="location" th:field="*{location}" class="form-control" required>
					<option value="">Select Location</option>
					<option value="NOIDA">NOIDA</option>
					<option value="DELHI">DELHI</option>
					<option value="AHAMDABAD">AHAMDABAD</option>
					<option value="PUNE">PUNE</option>
					<option value="MUMBAI">MUMBAI</option>
					<option value="BANGLORE">BANGLORE</option>
					<option value="CHENNAI">CHENNAI</option>
					<option value="PATNA">PATNA</option>
					<option value="GOA">GOA</option>
					<option value="HYDERABAD">HYDERABAD</option>
					<option value="KOLKATA">KOLKATA</option>
					<option value="LUCKNOW">LUCKNOW</option>
				</select>
			</div>

			<div class="modal-buttons">
				<button type="submit" class="btn-save">
					<i class="fas fa-save"></i> Save Employee
				</button>
				<button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
			</div>

		</form>

	</div>
</div>

<!-- SCRIPTS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
	// ========== CLOSE MODAL AND REDIRECT ==========
	function closeModalAndRedirect() {
		window.location.href = '/';
	}

	document.getElementById('closeModalBtn').addEventListener('click', closeModalAndRedirect);
	document.getElementById('cancelBtn').addEventListener('click', closeModalAndRedirect);

	// Close on outside click
	document.getElementById('employeeModal').addEventListener('click', function(e) {
		if (e.target === this) {
			closeModalAndRedirect();
		}
	});

	// Close on ESC key
	document.addEventListener('keydown', function(e) {
		if (e.key === 'Escape') {
			closeModalAndRedirect();
		}
	});

	// Form submit - normal flow, redirect automatically ho jayega
	$('#employeeForm').on('submit', function(e) {
		// No need to prevent default - normal submit hoga
		// Controller redirect / pe kar dega
	});
</script>

</body>
</html>
