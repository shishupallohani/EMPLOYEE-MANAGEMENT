<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Employee Management System</title>
	<link rel="icon" type="image/png" th:href="@{/images/logo.png}">
	<link rel="stylesheet"
		  href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

	<style>

		body{
			background:#f5f7fa;
		}

		.card{
			border:none;
			border-radius:12px;
		}

		.card-header{
			background: linear-gradient(135deg, #007bff, #0056b3);
			color:white;
			padding:20px;
			position: relative;
		}

		/* Header mein icon aur text ko align karne ke liye */
		.header-content {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 15px;
		}

		/* Bada icon jo page ke header mein dikhega */
		.header-icon {
			width: 50px;
			height: 50px;
			background: white;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 28px;
			color: #007bff;
			box-shadow: 0 4px 8px rgba(0,0,0,0.2);
		}

		/* Brand name ke liye */
		.brand-text {
			font-size: 28px;
			font-weight: bold;
			letter-spacing: 1px;
		}

		.brand-subtext {
			font-size: 14px;
			opacity: 0.9;
			font-weight: 300;
		}

		.table thead{
			background:#343a40;
			color:white;
		}

		.btn{
			border-radius:20px;
		}

		.page-link-custom{
			padding:6px 12px;
			border:1px solid #007bff;
			border-radius:5px;
			margin:2px;
			text-decoration:none;
		}

		.page-link-custom:hover{
			background:#007bff;
			color:white;
			text-decoration:none;
		}

		.active-page{
			background:#007bff;
			color:white;
			padding:6px 12px;
			border-radius:5px;
		}

		/* Responsive ke liye */
		@media (max-width: 576px) {
			.header-icon {
				width: 40px;
				height: 40px;
				font-size: 20px;
			}
			.brand-text {
				font-size: 20px;
			}
		}

	</style>

</head>

<body>

<div class="container mt-5">

	<div class="card shadow-lg">

		<div class="card-header text-center">

			<!-- Header mein icon aur text -->
			<div class="header-content">
				<div class="header-icon">
					👥
				</div>
				<div>
					<div class="brand-text">
						Employee Management System
					</div>
					<div class="brand-subtext">
						Manage your workforce efficiently
					</div>
				</div>
			</div>

		</div>

		<div class="card-body">

			<div class="d-flex justify-content-between mb-3">

				<h4 class="text-primary">
					Employee List
				</h4>

				<a th:href="@{/showNewEmployeeForm}"
				   class="btn btn-success">
					+ Add Employee
				</a>

			</div>

			<div class="table-responsive">

				<table class="table table-bordered table-hover text-center">

					<thead>

					<tr>

						<th>
							<a class="text-white"
							   th:href="@{'/page/' + ${currentPage} + '?sortField=firstName&sortDir=' + ${reverseSortDir}}">
								First Name
							</a>
						</th>

						<th>
							<a class="text-white"
							   th:href="@{'/page/' + ${currentPage} + '?sortField=lastName&sortDir=' + ${reverseSortDir}}">
								Last Name
							</a>
						</th>

						<th>
							<a class="text-white"
							   th:href="@{'/page/' + ${currentPage} + '?sortField=email&sortDir=' + ${reverseSortDir}}">
								Email
							</a>
						</th>

						<th width="220">
							Actions
						</th>

					</tr>

					</thead>

					<tbody>

					<tr th:each="employee : ${listEmployees}">

						<td th:text="${employee.firstName}"></td>

						<td th:text="${employee.lastName}"></td>

						<td th:text="${employee.email}"></td>

						<td>

							<a th:href="@{/showFormForUpdate/{id}(id=${employee.id})}"
							   class="btn btn-warning btn-sm">
								Update
							</a>

							<a th:href="@{/deleteEmployee/{id}(id=${employee.id})}"
							   class="btn btn-danger btn-sm"
							   onclick="return confirm('Are you sure you want to delete this employee?')">
								Delete
							</a>

						</td>

					</tr>

					</tbody>

				</table>

			</div>

			<div th:if="${totalPages > 1}">

				<hr>

				<div class="row">

					<div class="col-md-4">

						<strong>
							Total Employees :
						</strong>

						[[${totalItems}]]

					</div>

					<div class="col-md-8 text-right">

                        <span th:each="i : ${#numbers.sequence(1,totalPages)}">

                            <a class="page-link-custom"
							   th:if="${currentPage != i}"
							   th:href="@{'/page/' + ${i} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">
                                [[${i}]]
                            </a>

                            <span class="active-page"
								  th:unless="${currentPage != i}">
                                [[${i}]]
                            </span>

                        </span>

						&nbsp;

						<a class="btn btn-primary btn-sm"
						   th:if="${currentPage < totalPages}"
						   th:href="@{'/page/' + ${currentPage+1} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">
							Next
						</a>

						<a class="btn btn-dark btn-sm"
						   th:if="${currentPage < totalPages}"
						   th:href="@{'/page/' + ${totalPages} + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">
							Last
						</a>

					</div>

				</div>

			</div>

		</div>

	</div>

</div>

</body>

</html>
