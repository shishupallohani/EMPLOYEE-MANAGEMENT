services:

  employee-postgres:
    image: postgres:17
    container_name: employee-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: employee_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - employee_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d employee_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  employee-management:
    image: shishupallohani/employee-management:latest
    container_name: employee-management

    depends_on:
      employee-postgres:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:postgresql://employee-postgres:5432/employee_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

volumes:
  employee_postgres_data: